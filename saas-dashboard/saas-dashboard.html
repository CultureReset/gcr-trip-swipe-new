<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberCheck Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; }
    .header { background: white; border-bottom: 1px solid #ddd; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header button { padding: 8px 16px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
    .header button:hover { background: #0056b3; }
    .container { display: flex; min-height: calc(100vh - 61px); }
    .sidebar { width: 240px; background: white; border-right: 1px solid #ddd; padding: 16px 0; }
    .nav-item { padding: 12px 16px; cursor: pointer; font-size: 14px; color: #333; border-left: 3px solid transparent; }
    .nav-item:hover { background: #f9f9f9; }
    .nav-item.active { background: #f0f8ff; border-left-color: #007bff; color: #007bff; font-weight: 500; }
    .main { flex: 1; padding: 24px; overflow-y: auto; }
    .app-section { display: none; }
    .app-section.active { display: block; }
    .app-store { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .app-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 16px; cursor: pointer; text-align: center; }
    .app-card:hover { border-color: #007bff; box-shadow: 0 2px 8px rgba(0,123,255,0.1); }
    .app-icon { font-size: 32px; margin-bottom: 8px; }
    .app-name { font-weight: 500; margin-bottom: 4px; }
    .app-desc { font-size: 12px; color: #666; margin-bottom: 12px; }
    .app-button { padding: 6px 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .app-button:hover { background: #0056b3; }
    .app-button.installed { background: #28a745; }
    .loading { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>CyberCheck</h1>
    <button onclick="saasLogout()">Logout</button>
  </div>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div class="nav-item active" onclick="showSection('overview')">📊 Overview</div>
      <div class="nav-item" onclick="showSection('apps')">🎯 Apps</div>
      <div class="nav-item" onclick="showSection('settings')">⚙️ Settings</div>
    </div>

    <div class="main">
      <div class="app-section active" id="overview">
        <h2>Welcome to CyberCheck</h2>
        <p style="margin-top: 16px; color: #666;">Select an app from the sidebar to get started.</p>
      </div>

      <div class="app-section" id="apps">
        <h2>Apps & Tools</h2>
        <div id="appStore" class="app-store" style="margin-top: 20px;"></div>
      </div>

      <div class="app-section" id="settings">
        <h2>Settings</h2>
        <p style="margin-top: 16px; color: #666;">Settings coming soon.</p>
      </div>
    </div>
  </div>

  <script src="js/saas-auth.js"></script>
  <script src="js/saas-app-loader.js"></script>
  <script>
    function showSection(sectionId) {
      document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(sectionId).classList.add('active');
      event.target.classList.add('active');

      if (sectionId === 'apps') loadApps();
    }

    window.addEventListener('DOMContentLoaded', () => {
      checkAuth();
    });
  </script>
</body>
</html>
